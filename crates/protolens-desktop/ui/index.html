<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProtoLens</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar">
        <div>
          <p class="eyebrow">ProtoLens</p>
          <h1>Traffic capture desk</h1>
          <p class="intro">Capture TCP packets with the same Rust controller used by the CLI.</p>
        </div>

        <label>
          Interface
          <select id="interfaceSelect"></select>
        </label>

        <label>
          BPF Filter
          <input id="filterInput" value="tcp or udp port 53" spellcheck="false" />
        </label>

        <div class="field-grid">
          <label>
            Payload Limit
            <input id="payloadLimitInput" type="number" min="0" value="4096" />
          </label>
          <label>
            Count
            <input id="countInput" type="number" min="1" placeholder="live" />
          </label>
        </div>

        <div class="button-row">
          <button id="startButton">Start</button>
          <button id="stopButton" class="secondary" disabled>Stop</button>
        </div>

        <div class="file-tools">
          <label>
            Save PCAP Path
            <input id="pcapOutputInput" placeholder="Choose a .pcap path" spellcheck="false" />
          </label>
          <button id="savePcapPathButton" class="secondary">Save as...</button>
        </div>

        <div class="file-tools">
          <label>
            Load PCAP Path
            <input id="pcapLoadInput" placeholder="Choose a .pcap file" spellcheck="false" />
          </label>
          <button id="loadPcapPathButton" class="secondary">Open...</button>
        </div>

        <button id="loadPcapButton" class="ghost">Load selected PCAP</button>

        <button id="refreshButton" class="ghost">Refresh interfaces</button>
        <p id="status" class="status">Ready</p>
      </section>

      <section class="content">
        <div class="toolbar">
          <div>
            <p class="eyebrow">Live Events</p>
            <h2>Packets and DNS observations</h2>
          </div>
          <div class="toolbar-actions">
            <button id="timelineButton" class="icon-button ghost" type="button" title="Packet timeline" aria-label="Packet timeline">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 5v14" />
                <path d="M20 5v14" />
                <path d="M7 8h10" />
                <path d="m14 5 3 3-3 3" />
                <path d="M17 16H7" />
                <path d="m10 13-3 3 3 3" />
              </svg>
            </button>
            <button id="clearButton" class="ghost">Clear</button>
          </div>
        </div>

        <div class="result-layout">
          <aside class="links-panel">
            <div class="links-panel-header">
              <p class="eyebrow">Links</p>
              <span id="linkCount" class="link-count">0</span>
            </div>
            <select id="linkSelect" class="link-select">
              <option value="">All links</option>
            </select>
            <input
              id="linkFilterInput"
              class="link-filter-input"
              placeholder="Filter links, e.g. 443 or TCP"
              spellcheck="false"
            />
            <div id="links" class="links"></div>
          </aside>

          <div id="events" class="events"></div>
        </div>
      </section>
    </main>

    <div id="timelineModal" class="modal-backdrop" hidden>
      <section class="timeline-modal" role="dialog" aria-modal="true" aria-labelledby="timelineTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow">Packet Timeline</p>
            <h2 id="timelineTitle">Sequence view</h2>
          </div>
          <button id="timelineCloseButton" class="icon-button ghost" type="button" title="Close" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12" />
              <path d="M18 6 6 18" />
            </svg>
          </button>
        </header>
        <div id="timelineMeta" class="timeline-meta"></div>
        <div class="timeline-body">
          <div id="timelineChart" class="timeline-chart"></div>
          <aside id="timelinePacketList" class="timeline-packet-list"></aside>
          <aside id="timelinePacketDetail" class="timeline-packet-detail"></aside>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
